<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Pola Pytkowska</title>

<style>

/* animacja zmiany kolorów tła */
@keyframes kolor {
  0% {background-color: #ff6ec7;}
  25% {background-color: #6effe2;}
  50% {background-color: #ffe66e;}
  75% {background-color: #a06eff;}
  100% {background-color: #ff6ec7;}
}

body{
  margin:0;
  font-family: Arial, sans-serif;
  text-align:center;
  animation: kolor 8s infinite;
}

/* nagłówek */
header{
  background: rgba(0,0,0,0.6);
  color:white;
  padding:25px;
  font-size:32px;
}

/* sekcja */
main{
  padding:40px;
}

h1{
  font-size:40px;
  color:white;
}

p{
  font-size:22px;
  color:white;
}

/* gif */
.gif{
  margin-top:30px;
  width:300px;
  border-radius:15px;
  box-shadow:0 0 15px rgba(0,0,0,0.4);
}

/* stopka */
footer{
  margin-top:40px;
  background: rgba(0,0,0,0.6);
  color:white;
  padding:15px;
}

</style>
</head>

<body>

<header>
Pola Pytkowska
</header>

<main>

<h1>Studentka medycyny</h1>

<img class="gif" src="https://media.giphy.com/media/3oEjI6SIIHBdRxXI40/giphy.gif" alt="meme gif">

</main>

<footer>
Kolorowa strona internetowa • 2026
</footer>

</body>
</html>
