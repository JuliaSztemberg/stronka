<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Strona Stefana</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    text-align:center;
    background: linear-gradient(45deg, #ff00cc, #00ffff, #ffff00);
    color:white;
}

/* Nagłówek */
header{
    background:black;
    padding:20px;
    font-size:28px;
    letter-spacing:2px;
}

/* Główna sekcja */
main{
    height:70vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* Emotikon */
.emoji{
    font-size:100px;
    margin:20px;
}

/* Cytat */
.quote{
    font-style:italic;
    background:rgba(0,0,0,0.4);
    padding:15px;
    border-radius:10px;
    max-width:500px;
}

/* Stopka */
footer{
    background:black;
    padding:10px;
    font-size:14px;
}
</style>
</head>

<body>

<header>
Stefan Stefanowicz
</header>

<main>

<div class="emoji">😎</div>

<div class="quote">
"Not all those who wander are lost." – J.R.R. Tolkien
</div>

</main>

<footer>
Strona testowa • 2026 • Kontakt: stefan@example.com
</footer>

</body>
</html>
